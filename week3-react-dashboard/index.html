<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Week 3 | React Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: auto;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
    table {
      width: 100%;
      background: #fff;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      cursor: pointer;
      background: #eee;
    }
    input {
      padding: 8px;
      width: 200px;
      margin-bottom: 10px;
    }
    canvas {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-top: 30px;
    }
    @media(max-width:768px){
      .cards{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function Dashboard() {
  const [search, setSearch] = React.useState("");
  const [users, setUsers] = React.useState([
    { name: "Umesh", sales: 120 },
    { name: "Aman", sales: 90 },
    { name: "Ravi", sales: 150 }
  ]);

  React.useEffect(() => {
    const ctx = document.getElementById("salesChart");
    new Chart(ctx, {
      type: "bar",
      data: {
        labels: users.map(u => u.name),
        datasets: [{
          label: "Sales",
          data: users.map(u => u.sales),
          backgroundColor: "#4CAF50"
        }]
      }
    });
  }, []);

  function sortBySales() {
    const sorted = [...users].sort((a, b) => b.sales - a.sales);
    setUsers(sorted);
  }

  const filteredUsers = users.filter(u =>
    u.name.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="container">
      <h1>React Dashboard</h1>

      {/* STATS */}
      <div className="cards">
        <div className="card">Users: {users.length}</div>
        <div className="card">Total Sales: ₹{users.reduce((a,b)=>a+b.sales,0)}</div>
        <div className="card">Top Seller: {users[0].name}</div>
      </div>

      {/* FILTER */}
      <input
        type="text"
        placeholder="Search user..."
        value={search}
        onChange={e => setSearch(e.target.value)}
      />

      {/* TABLE */}
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th onClick={sortBySales}>Sales ⬍</th>
          </tr>
        </thead>
        <tbody>
          {filteredUsers.map((u, i) => (
            <tr key={i}>
              <td>{u.name}</td>
              <td>{u.sales}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {/* CHART */}
      <canvas id="salesChart"></canvas>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);

</script>
</body>
</html>
